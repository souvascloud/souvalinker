spring:
  application:
    name: souvalinker

  datasource:
    primary:
      url: ${PRIMARY_DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver

    replica:
      url: ${REPLICA_DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  level:
    root: INFO
    org.springframework.security: WARN
    com.souvanik.souvalinker: INFO

  pattern:
    console: "%d [%X{X-Request-ID}] %-5level %logger - %msg%n"


app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}

  auth:
    reset-token-expiry-minutes: ${RESET_TOKEN_EXPIRY_MINUTES:30}
    verify-token-expiry-hours: ${VERIFY_TOKEN_EXPIRY_HOURS:24}
    refresh-token-expiry-days: ${REFRESH_TOKEN_EXPIRY_DAYS:7}

  short-url:
    base-url: ${BASE_URL}
    code-length: ${SHORT_CODE_LENGTH:7}

  mail:
    from-email: ${FROM_EMAIL}

  aws:
    region: ${AWS_REGION}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: souvalinker

  tracing:
    sampling:
      probability: 1.0

info:
  app:
    name: souvalinker
    version: 1.0.0
    description: URL Shortener Service